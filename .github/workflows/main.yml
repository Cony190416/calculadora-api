name: Spring Boot CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  snyk-security-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest

    steps:

      # Paso 1: Checkout del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # Paso 2: Configurar JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Paso 3: Configurar Node.js para instalar Snyk CLI
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Paso 4: Configurar cache de Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # Paso 5: Instalar Snyk CLI
      - name: Install Snyk CLI
        run: npm install -g snyk

      # Paso 6: Autenticar Snyk con token guardado en GitHub Secrets
      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      # Paso 7: Ejecutar análisis de vulnerabilidades
      - name: Run Snyk Test
        run: snyk test --severity-threshold=high || true

      # Paso 8: Generar reporte JSON de Snyk
      - name: Generate Snyk Report
        if: always()
        run: |
          snyk test --json > snyk-report.json || echo "{}" > snyk-report.json

      # Paso 9: Subir reporte de Snyk como artefacto
      - name: Upload Snyk Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json


  test:
    name: Run Tests with JaCoCo
    runs-on: ubuntu-latest
    needs: snyk-security-scan

    steps:

      # Paso 1: Checkout del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # Paso 2: Configurar JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Paso 3: Configurar cache de Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # Paso 4: Construir el proyecto y ejecutar tests
      - name: Build and test
        run: mvn clean verify

      # Paso 5: Publicar reporte de cobertura JaCoCo
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/


  build:
    name: Build Jar
    runs-on: ubuntu-latest
    needs: test

    steps:

      # Paso 1: Checkout del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # Paso 2: Configurar JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Paso 3: Construir el artefacto JAR
      - name: Package application
        run: mvn clean package -DskipTests

      # Paso 4: Subir artefacto JAR
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
